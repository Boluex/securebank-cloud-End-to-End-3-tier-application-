apiVersion: v1
kind: ConfigMap
metadata:
  name: securebank-config
  namespace: securebank
data:
  DB_PORT: "5432"
  # NOTE: DATABASE_URL is now assembled in the backend Deployment via
  # Kubernetes $(VAR) dependent-env expansion from the POSTGRES_* secret
  # values. ConfigMaps do NOT perform ${...} shell substitution, which is
  # why the previous literal value reached the app unexpanded.


---
apiVersion: v1
kind: Secret
metadata:
  name: securebank-secret
  namespace: securebank
type: Opaque
stringData:
  POSTGRES_USER: securebank
  POSTGRES_PASSWORD: c2VjdXJlYmFuaw==
  POSTGRES_DB: securebank
  POSTGRES_HOST: securebank-db
  POSTGRES_PORT: "5432"
  # Required by the backend application (app/config.py Settings).
  # SECRET_KEY: general app secret. ENCRYPTION_KEY: valid Fernet key
  # (32 url-safe base64 bytes) used to encrypt account balances at rest.
  SECRET_KEY: hO26laveYaIAZ0W42t0iyazc4dLdum52FWKxu9G1bIyYxxxMyr8uiQKhYPil3RZz
  ENCRYPTION_KEY: ZBj_5KFmp9malt19bHMt9fWkjyYvYw66DMmccatdK4I=

---
