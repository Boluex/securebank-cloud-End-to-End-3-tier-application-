alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-secret
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-notifications"
      routes:
        - receiver: "slack-notifications"
          match:
            severity: "critical"
    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url_file: "/etc/alertmanager/secrets/alertmanager-slack-secret/slack_api_url"
            channel: "#securebank-alerts"
            text: "{{ .CommonAnnotations.summary }}"