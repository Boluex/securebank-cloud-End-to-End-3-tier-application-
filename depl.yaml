---
apiVersion: v1
kind: Namespace
metadata:
  name: securebank

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-data
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: "gp3"
  hostPath:
    path: "/tmp/db-data"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: securebank-db
  namespace: securebank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: securebank-db
  template:
    metadata:
      labels:
        app: securebank-db
    spec:
      containers:
        - name: securebank-db
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: securebank-secret
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
      
             

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-be
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-be
  template:
    metadata:
      labels:
        app: securebank-be
    spec:
      containers:
        - name: securebank-be
          image: boluex/securebank-backend:16
          ports:
            - containerPort: 8000
          env:
            # POSTGRES_* / SECRET_KEY / ENCRYPTION_KEY come from the secret.
            # They are listed explicitly (and BEFORE DATABASE_URL) so the
            # $(VAR) expansion below resolves reliably from earlier entries.
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: POSTGRES_DB
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: securebank-secret
                  key: ENCRYPTION_KEY
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"

          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m" 
             


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-fe
  namespace: securebank
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-fe
  template:
    metadata:
      labels:
        app: securebank-fe
    spec:
      containers:
        - name: securebank-fe
          image: boluex/securebank-frontend:16
          ports:
            - containerPort: 80