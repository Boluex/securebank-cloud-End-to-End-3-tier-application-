---
apiVersion: v1
kind: Namespace
metadata:
  name: securebank

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-data
spec:
  storageClassName: "gp3"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: securebank-db
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-db
  template:
    metadata:
      labels:
        app: securebank-db
    spec:
      containers:
        - name: securebank-db
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            secretKeyRef:
              name: securebanksecret
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      
      readinessProbe:
        tcpSocket:
          port: 5432
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        tcpSocket:
          port: 5432
        initialDelaySeconds: 10
        periodSeconds: 10
      resources:
        requests:
          memory: "64Mi"
          cpu: "256Mi"
        limits:
          memory: "128Mi"
          cpu: "512Mi"

  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
      
             

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-be
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-be
  template:
    metadata:
      labels:
        app: securebank-be
    spec:
      containers:
        - name: securebank-be
          image: securebank-be-1
          ports:
            - containerPort: 80
          env:
             valueFrom:
               configMapKeyRef:
                 name: securebank-config
                 key: DATABASE_URL

      readinessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
      resources:
        requests:
          memory: "64Mi"
          cpu: "256Mi"
        limits:
          memory: "128Mi"
          cpu: "512Mi" 
             


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-fe
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank
  template:
    metadata:
      labels:
        app: securebank
    spec:
      containers:
        - name: securebank-fe
          image: securebank-fe-1
          ports:
            - containerPort: 80